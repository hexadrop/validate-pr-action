name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build bundle
        run: bun run build

      - name: Verify dist is up to date
        run: |
          git diff --exit-code dist/index.js || (
            echo "dist/index.js is out of date. Run 'bun run build' and commit the changes." &&
            exit 1
          )
